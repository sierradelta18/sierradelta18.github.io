            padding: 0;
            box-sizing: border-box;

            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling on landing page */
        }

        /* --- Landing Page Styling --- */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #landing-page.fading-out {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 6vw, 5.5rem);
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 0.8em;
            text-align: center;
            color: #fff;
        }

        .profiles-container {
            display: flex;
            gap: clamp(20px, 4vw, 40px);
            justify-content: center;
            flex-wrap: wrap;
        }

        .profile-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .profile-wrapper:hover {
            transform: scale(1.05);
        }

        .profile-icon {
            width: var(--profile-size);
            height: var(--profile-size);
            border-radius: 4px;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--profile-size) * 0.4);
            transition: border-color 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .profile-wrapper:hover .profile-icon {
            border-color: var(--text-hover);
        }

        /* Profile Specific Images & Fallbacks */
        .profile-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
            z-index: 2;
        }

        .exec-icon {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: #ffffff;
        }

        .creative-icon {
            background: linear-gradient(135deg, #3F3F37, #991E29);
            color: #A4C4DF;
        }

        .profile-name {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #808080;
            transition: color 0.2s ease;
        }

        .profile-subtitle {
            margin-top: 5px;
            font-size: 0.8rem;
            color: #606060;
            font-style: italic;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
        }

        .profile-wrapper:hover .profile-name {
            color: var(--text-hover);
        }
        
        .profile-wrapper:hover .profile-subtitle {
            opacity: 1;
        }

        .manage-button {
            margin-top: 5em;
            padding: 0.5em 1.5em;
            font-size: 1.2rem;
            color: #808080;
            border: 1px solid #808080;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .manage-button:hover {
            color: var(--text-hover);
            border-color: var(--text-hover);
        }

        /* --- Loader Styling --- */
        #loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 0, 0, 0.3); /* Netflix Red-ish */
            border-radius: 50%;
            border-top-color: #E50914;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Iframe Styling --- */
        #portfolio-frame {
            width: 100vw;
            height: 100vh;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s ease;
            display: none;
            background-color: #ffffff; /* Default background for child docs */
        }

        /* --- Global Back Button --- */
        #back-btn {

            bottom: 30px;
            right: 30px;
            z-index: 1000; /* Stays above the iframe */
            background: rgba(20, 20, 20, 0.9);

            backdrop-filter: blur(5px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #back-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        #back-btn:hover {

            color: #141414;
            transform: scale(1.05);
        }

        #back-btn svg {
            width: 18px;
            height: 18px;
        }

<script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = -100, my = -100, rx = -100, ry = -100;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    const animateCursor = () => {
        cursor.style.left = mx + 'px';
        cursor.style.top  = my + 'px';
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(animateCursor);
    };
    animateCursor();

    // Scale cursor on hover
    document.querySelectorAll('a, button, .case-item, .quest-cell, .metric-row').forEach(el => {
        el.addEventListener('mouseenter', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(2.2)';
            cursor.style.background = 'var(--red)';
            ring.style.opacity = '0.4';
        });
        el.addEventListener('mouseleave', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            cursor.style.background = 'var(--red)';
            ring.style.opacity = '1';
        });
    });

    // Intersection Observer
    const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.classList.add('visible');
                io.unobserve(e.target);
            }
        });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal, .stagger').forEach(el => io.observe(el));

    // Hero immediate reveal
    document.querySelectorAll('.hero .reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 200 + i * 150);
    });
<\/script>

            // 1. Fade out the selection screen
            landingPage.classList.add('fading-out');

            // 2. Show the "loading" spinner temporarily
            setTimeout(() => {
                landingPage.style.display = 'none';
                loader.style.display = 'block';

                // 3. Inject the code safely using srcdoc
                setTimeout(() => {
                    iframe.srcdoc = type === 'executive' ? executiveHTML : creativeHTML;
                    iframe.style.display = 'block';
                    
                    // 4. Fade out loader, fade in the selected portfolio & back button
                    setTimeout(() => {
                        loader.style.display = 'none';
                        iframe.style.opacity = '1';
                        backBtn.classList.add('visible');
                    }, 500);

                }, 800); // give the spinner a moment to play
            }, 600); // matches the CSS transition time
        }

        function goBack() {
            const landingPage = document.getElementById('landing-page');
            const iframe = document.getElementById('portfolio-frame');
            const backBtn = document.getElementById('back-btn');

            // 1. Fade out back button and iframe
            backBtn.classList.remove('visible');
            iframe.style.opacity = '0';

            // 2. Wait for fade out, then destroy iframe content and show landing
            setTimeout(() => {
                iframe.style.display = 'none';
                iframe.srcdoc = ''; // Clear it out completely
                
                // Bring back the landing page
                landingPage.style.display = 'flex';
                
                // Small delay to ensure display:flex is registered before fading in
                requestAnimationFrame(() => {
                    landingPage.classList.remove('fading-out');
                });
            }, 600);
        }
    </script>
</body>
</html>
